<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股財務分析 Agent</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card-bg: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
    --primary: #1e3a5f;
    --primary-2: #2c5f8a;
    --up: #d92c2c;
    --down: #1a8a3a;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    margin: 0 0 6px;
    font-size: 24px;
    color: var(--primary);
  }
  header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .settings summary {
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    color: var(--primary-2);
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .settings summary::-webkit-details-marker { display: none; }
  .settings summary::before {
    content: '⚙';
    font-size: 15px;
  }
  .settings[open] summary { margin-bottom: 14px; }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  input[type="text"], input[type="url"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: #fafafa;
    color: var(--text);
  }
  input[type="text"]:focus, input[type="url"]:focus {
    outline: none;
    border-color: var(--primary-2);
    background: #fff;
  }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row .field { flex: 1; margin-bottom: 0; }
  button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: var(--primary-2);
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: var(--primary); }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    color: var(--primary-2);
    border: 1px solid var(--primary-2);
  }
  button.secondary:hover { background: #eef4f9; }
  .status-line {
    font-size: 12px;
    margin-top: 8px;
    color: var(--text-muted);
  }
  .status-line.ok { color: var(--down); }
  .status-line.err { color: var(--up); }
  .query-card {
    display: flex;
    gap: 10px;
  }
  .query-card input { flex: 1; }
  #tickerInput { font-size: 18px; font-weight: bold; letter-spacing: 1px; }

  #result { min-height: 40px; }
  .placeholder {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 30px 10px;
  }
  .spinner {
    display: inline-block;
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary-2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading { text-align: center; padding: 30px 10px; color: var(--text-muted); font-size: 14px; }

  .report-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-muted);
  }
  .report-meta .badge {
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    color: #fff;
    padding: 4px 12px;
    border-radius: 999px;
    font-weight: bold;
    font-size: 13px;
  }
  .report h1 { font-size: 19px; color: var(--primary); margin: 0 0 16px; }
  .report h2 { font-size: 16px; color: var(--primary-2); margin: 22px 0 10px; }
  .report h2:first-of-type { margin-top: 0; }
  .report p { font-size: 14px; line-height: 1.8; color: var(--text); margin: 0 0 10px; }
  .report ul { margin: 0 0 14px; padding-left: 20px; }
  .report li { font-size: 14px; line-height: 1.8; margin-bottom: 4px; }
  .report strong { color: var(--primary); }
  .report hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .report .disclaimer { font-size: 12px; color: var(--text-muted); font-style: italic; }

  .error-box {
    background: #fdecec;
    border: 1px solid #f3c1c1;
    color: #a12c2c;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 20px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>📊 台股財務分析 Agent</h1>
      <p>輸入股票代號，透過 n8n Webhook 呼叫 AI 產生投資分析報告</p>
    </header>

    <div class="card">
      <details class="settings" id="settingsBlock">
        <summary>Webhook 設定</summary>
        <div class="field">
          <label for="webhookUrl">n8n Webhook URL</label>
          <input type="url" id="webhookUrl" placeholder="https://your-instance.app.n8n.cloud/webhook/taiwan-stock-agent">
        </div>
        <div class="row" style="margin-top:12px;">
          <button id="saveWebhookBtn">儲存設定</button>
          <button class="secondary" id="testWebhookBtn">測試連線</button>
        </div>
        <div class="status-line" id="webhookStatus"></div>
      </details>
    </div>

    <div class="card">
      <label for="tickerInput">股票代號</label>
      <div class="query-card">
        <input type="text" id="tickerInput" placeholder="例如 2330" value="2330" maxlength="10">
        <button id="submitBtn">產生報告</button>
      </div>
    </div>

    <div class="card" id="result">
      <div class="placeholder">尚未查詢，輸入代號後按「產生報告」</div>
    </div>

    <footer>報告由 AI 產生，僅供參考，不構成投資建議</footer>
  </div>

<script>
(function () {
  const STORAGE_KEY = 'twStockAgent.webhookUrl';

  const webhookInput = document.getElementById('webhookUrl');
  const settingsBlock = document.getElementById('settingsBlock');
  const saveBtn = document.getElementById('saveWebhookBtn');
  const testBtn = document.getElementById('testWebhookBtn');
  const webhookStatus = document.getElementById('webhookStatus');
  const tickerInput = document.getElementById('tickerInput');
  const submitBtn = document.getElementById('submitBtn');
  const resultBox = document.getElementById('result');

  const savedUrl = localStorage.getItem(STORAGE_KEY) || '';
  webhookInput.value = savedUrl;
  if (!savedUrl) settingsBlock.open = true;

  function setStatus(msg, kind) {
    webhookStatus.textContent = msg;
    webhookStatus.className = 'status-line' + (kind ? ' ' + kind : '');
  }

  function normalizeUrl(raw) {
    let url = (raw || '').trim();
    if (url && !/^https?:\/\//i.test(url)) {
      url = 'https://' + url;
    }
    return url;
  }

  function getWebhookUrl() {
    const normalized = normalizeUrl(webhookInput.value);
    if (normalized !== webhookInput.value.trim()) {
      webhookInput.value = normalized;
    }
    return normalized;
  }

  saveBtn.addEventListener('click', function () {
    const url = getWebhookUrl();
    if (!url) {
      setStatus('請先輸入 Webhook URL', 'err');
      return;
    }
    try {
      new URL(url);
    } catch (e) {
      setStatus('URL 格式不正確', 'err');
      return;
    }
    localStorage.setItem(STORAGE_KEY, url);
    setStatus('已儲存', 'ok');
    settingsBlock.open = false;
  });

  testBtn.addEventListener('click', async function () {
    const url = getWebhookUrl();
    if (!url) {
      setStatus('請先輸入 Webhook URL', 'err');
      return;
    }
    testBtn.disabled = true;
    setStatus('測試中...');
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker: '2330' })
      });
      if (res.ok) {
        setStatus('連線成功（HTTP ' + res.status + '）', 'ok');
      } else {
        setStatus('連線失敗（HTTP ' + res.status + '）', 'err');
      }
    } catch (e) {
      setStatus('連線失敗：' + e.message, 'err');
    } finally {
      testBtn.disabled = false;
    }
  });

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // Minimal markdown -> HTML renderer for the report shape produced by the AI Agent
  function renderMarkdown(md) {
    const lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    let html = '';
    let inList = false;

    function closeList() {
      if (inList) { html += '</ul>'; inList = false; }
    }
    function inline(text) {
      let t = escapeHtml(text);
      t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      return t;
    }

    for (let raw of lines) {
      const line = raw.trim();
      if (line === '') { closeList(); continue; }
      if (line.startsWith('# ')) {
        closeList();
        html += '<h1>' + inline(line.slice(2)) + '</h1>';
      } else if (line.startsWith('## ')) {
        closeList();
        html += '<h2>' + inline(line.slice(3)) + '</h2>';
      } else if (line.startsWith('### ')) {
        closeList();
        html += '<h2>' + inline(line.slice(4)) + '</h2>';
      } else if (line.startsWith('- ') || line.startsWith('* ')) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + inline(line.slice(2)) + '</li>';
      } else if (/^(免責聲明|⚠️?\s*免責)/.test(line)) {
        closeList();
        html += '<p class="disclaimer">' + inline(line) + '</p>';
      } else {
        closeList();
        html += '<p>' + inline(line) + '</p>';
      }
    }
    closeList();
    return html;
  }

  function showPlaceholder() {
    resultBox.innerHTML = '<div class="placeholder">尚未查詢，輸入代號後按「產生報告」</div>';
  }

  function showLoading(ticker) {
    resultBox.innerHTML =
      '<div class="loading"><div class="spinner"></div><div>正在為 ' + escapeHtml(ticker) + ' 產生分析報告...</div></div>';
  }

  function showError(message) {
    resultBox.innerHTML = '<div class="error-box">' + escapeHtml(message) + '</div>';
  }

  function showReport(data) {
    const ticker = data.ticker || tickerInput.value;
    const generatedAt = data.generated_at ? new Date(data.generated_at).toLocaleString('zh-TW') : '';
    const reportHtml = renderMarkdown(data.report || '(無報告內容)');
    resultBox.innerHTML =
      '<div class="report-meta">' +
        '<span class="badge">' + escapeHtml(ticker) + '</span>' +
        '<span>' + escapeHtml(generatedAt) + '</span>' +
      '</div>' +
      '<div class="report">' + reportHtml + '</div>';
  }

  async function submit() {
    const url = getWebhookUrl();
    const ticker = (tickerInput.value || '').trim();

    if (!url) {
      settingsBlock.open = true;
      setStatus('請先設定並儲存 Webhook URL', 'err');
      return;
    }
    if (!ticker) {
      tickerInput.focus();
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '查詢中...';
    showLoading(ticker);

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker: ticker })
      });

      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (e) {
        throw new Error('回應不是有效的 JSON：' + text.slice(0, 200));
      }

      if (!res.ok) {
        throw new Error('伺服器回應錯誤（HTTP ' + res.status + '）：' + (data.message || text.slice(0, 200)));
      }

      showReport(data);
    } catch (e) {
      showError('查詢失敗：' + e.message + '\n\n請確認 Webhook URL 是否正確、n8n workflow 是否已啟用（Active）。');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '產生報告';
    }
  }

  submitBtn.addEventListener('click', submit);
  tickerInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submit();
  });
})();
</script>
</body>
</html>
